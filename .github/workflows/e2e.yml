name: End-to-end tests

# Runs the Testcontainers-based end-to-end suite. Kept OUT of the PR "Build and Package" gate
# because it spins up real TeamCity/Octopus/MSSQL containers and Playwright, so it is slow
# (tens of minutes) and not suitable as a synchronous PR check. Triggered manually and nightly.
on:
  workflow_dispatch:
  schedule:
    # Daily 5am Australia/Brisbane (7pm UTC)
    - cron: '0 19 * * *'

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    # Generous bound: the suite stands up containers per test today. Lower this once container
    # reuse lands. Still finite so a hung test can't run for hours.
    timeout-minutes: 120

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'

    - name: Set up Gradle caching
      uses: gradle/actions/setup-gradle@v4

    # Caches the Playwright browser binaries (~/.cache/ms-playwright), keyed on the Playwright
    # version in e2e/build.gradle. Bump the key when that version changes.
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-1.60.0

    # playwrightInstall fetches Chromium (and, with --with-deps, its system libraries) so the
    # Playwright UI tests have a browser to launch. e2eTest builds the plugin zip itself (it
    # dependsOn the root distZip).
    - name: Execute end-2-end tests
      run: ./gradlew :e2e:playwrightInstall :e2e:e2eTest
      env:
        OCTOPUS_LICENSE: ${{ secrets.OCTOPUS_LICENSE }}
        OCTOPUS_SDK_AT_USE_EXISTING_SERVER: false
