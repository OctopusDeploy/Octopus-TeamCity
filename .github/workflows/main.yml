name: Build, Test, Package and Push

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events
  pull_request:
    branches:
      - '**'
  release:
    types: [published]

  schedule:
    # Daily 5am australian/brisbane time (7pm UTC)
    - cron: '0 19 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT

jobs:
  build:
    name: "Build and Package"
    runs-on: ubuntu-latest
    # conditionally skip build on PR merge of release-please, because the release creation is going to trigger the real build
    if: ${{ github.ref_name != 'main' || github.event.head_commit.author.username != 'team-integrations-fnm-bot' }}
    outputs:
      version: ${{ steps.git-version.outputs.nugetVersion }}
      package-basename: ${{ steps.create-package.outputs.package-basename }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'

    # Caches ~/.gradle (resolved dependencies + wrapper distributions) and runs cache cleanup.
    # By default the cache is only written from the default branch; PR builds read it but don't
    # write, which avoids PR runs poisoning the shared cache.
    - name: Set up Gradle caching
      uses: gradle/actions/setup-gradle@v4

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0.9.13
      with:
        versionSpec: '5.x'

    - name: Call GitVersion
      uses: gittools/actions/gitversion/execute@v0.9.13

    - name: Determine Version
      id: git-version
      run: |
        if [ "${{ github.event_name }}" == "schedule" ]
        then
          echo "::set-output name=nuGetVersion::${GITVERSION_MAJORMINORPATCH}-nightly-${{ github.run_number }}"
          echo "Version: ${GITVERSION_MAJORMINORPATCH}-nightly-${{ github.run_number }}"
        else
          echo "::set-output name=nuGetVersion::${GITVERSION_FULLSEMVER}"
          echo "Version: ${GITVERSION_FULLSEMVER}"
        fi

    - name: Build with gradle
      run: ./gradlew build test -Pversion=${{ steps.git-version.outputs.nugetVersion }}

    - name: Create Plugin Zip Deployment
      id: create-package
      run: |
        ./gradlew distZip -Pversion=${{ steps.git-version.outputs.nugetVersion }}
        PACKAGE_NAME=`./gradlew -q packageName  -Pversion=${{ steps.git-version.outputs.nugetVersion }}`
        echo "::set-output name=package-created::$PACKAGE_NAME"
        echo "::set-output name=package-basename::$(basename "$PACKAGE_NAME")"

    - uses: actions/upload-artifact@v4
      with:
        name: Octopus.TeamCity.${{ steps.git-version.outputs.nugetVersion }}
        path: '${{ steps.create-package.outputs.package-created }}'

  e2e:
    name: "End-to-end tests"
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref_name != 'main' || github.event.head_commit.author.username != 'team-integrations-fnm-bot' }}
    # Bounds the suite so a hung test fails the job instead of running for hours. e2eTest builds the
    # plugin zip itself (it dependsOn the root distZip), so it doesn't consume build's artifact;
    # gating on build just avoids running the long suite when compilation/unit tests have failed.
    timeout-minutes: 45

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'

    - name: Set up Gradle caching
      uses: gradle/actions/setup-gradle@v4

    # Caches the Playwright browser binaries (~/.cache/ms-playwright), keyed on the Playwright
    # version in e2e/build.gradle. Bump the key when that version changes.
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-1.60.0

    # playwrightInstall fetches Chromium (and its system libs) so the Playwright UI tests have a
    # browser to launch. The suite shares one container stack (see SharedStack), so it's far faster
    # than booting per test.
    - name: Execute end-2-end tests
      run: ./gradlew :e2e:playwrightInstall :e2e:e2eTest
      env:
        OCTOPUS_LICENSE: ${{ secrets.OCTOPUS_LICENSE }}
        OCTOPUS_SDK_AT_USE_EXISTING_SERVER: false

  publish:
    name: "Publish to Octopus"
    needs: [build, e2e]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name != 'main' || github.event.head_commit.author.username != 'team-integrations-fnm-bot' }}
    env:
      OCTOPUS_HOST: ${{ secrets.OCTOPUS_SERVER }}
      OCTOPUS_SPACE: Integrations

    steps:
    # push-build-information reads git history, so check out the repo (full history).
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Download package artifact
      uses: actions/download-artifact@v4
      with:
        name: Octopus.TeamCity.${{ needs.build.outputs.version }}
        path: package

    - name: Login to Octopus
      uses: OctopusDeploy/login@v1
      with:
        server: ${{ secrets.OCTOPUS_SERVER }}
        service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT }}

    - name: Push build information 🐙
      uses: OctopusDeploy/push-build-information-action@v3
      with:
        packages: 'Octopus.TeamCity'
        version: ${{ needs.build.outputs.version }}

    - name: Install Octopus CLI 🐙
      uses: OctopusDeploy/install-octopus-cli-action@v1

    - name: Push a package to Octopus Deploy 🐙
      uses: OctopusDeploy/push-package-action@v3
      with:
        packages: 'package/${{ needs.build.outputs.package-basename }}'

    - name: Fetch Release Notes
      id: fetch-release-notes
      if: github.event_name == 'release'
      run: |
        echo "::debug::${{github.event_name}}"
        OUTPUT_FILE="release_notes.txt"
        jq --raw-output '.release.body' ${{ github.event_path }} | sed 's#\r#  #g' > $OUTPUT_FILE
        echo "::set-output name=release-note-file::$OUTPUT_FILE"

    - name: Create a release in Octopus Deploy 🐙
      uses: OctopusDeploy/create-release-action@v3
      with:
        project: 'TeamCity Plugin'
        package_version: ${{ needs.build.outputs.version }}
        release_notes_file: ${{ steps.fetch-release-notes.outputs.release-note-file }}
